<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Context7 Proxy</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwindcss.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        sans: ['DM Sans', 'system-ui', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      }
    }
  }
}
</script>
<style>
:root {
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.15);
  --sidebar-w: 220px;
  --topbar-h: 56px;
}
body { font-family: 'DM Sans', system-ui, sans-serif; }

/* Sidebar active indicator */
.nav-item.active { background: var(--accent-glow); border-right: 3px solid var(--accent); }
.nav-item.active .nav-icon { color: var(--accent); }
.nav-item.active .nav-label { color: #fff; font-weight: 600; }

/* Transition */
.nav-item { transition: all 0.15s ease; }
.nav-item:hover { background: rgba(255,255,255,0.04); }

/* === Light theme === */
.light body { background: #f8f9fb; color: #1a1a2e; }
.light .sidebar { background: #fff; border-color: #e5e7eb; }
.light .topbar { background: #fff; border-color: #e5e7eb; }
.light .card { background: #fff; border-color: #e5e7eb; }
.light .nav-item:hover { background: #f3f4f6; }
.light .nav-item.active { background: #eef2ff; border-right-color: var(--accent); }
.light .nav-item.active .nav-label { color: #1a1a2e; }
.light .modal-bg { background: rgba(0,0,0,0.3); }

/* === Dark theme === */
.dark body { background: #0a0a12; color: #e2e8f0; }
.dark .sidebar { background: #0f0f1a; border-color: #2a2a3e; }
.dark .topbar { background: #0f0f1a; border-color: #2a2a3e; }
.dark .card { background: #14142a; border-color: #2a2a3e; }
.dark .modal-bg { background: rgba(0,0,0,0.6); }

/* Dark form controls — unified (CSS-only, no Tailwind CDN dependency) */
.dark input, .dark select, .dark textarea, .dark pre,
.dark .dk-input, .dark .dk-btn {
  background: #1a1a2e !important;
  border-color: #3a3a50 !important;
  color: #e2e8f0 !important;
}
.dark input:focus, .dark select:focus, .dark textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(99,102,241,0.25);
}
.dark option { background: #1a1a2e; color: #e2e8f0; }

/* Dark input helper — for elements styled via Tailwind but needing dark bg */
.dark .dk-input { background: #1a1a2e !important; border-color: #3a3a50 !important; color: #e2e8f0 !important; }
.dark .dk-btn { background: #1a1a2e !important; border-color: #3a3a50 !important; color: #e2e8f0 !important; }
.dark .dk-btn:hover { background: #2a2a3e !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
.dark ::-webkit-scrollbar-thumb { background: #3a3a50; border-radius: 3px; }
.light ::-webkit-scrollbar-thumb { background: #ccc; }

/* Chart canvas */
canvas { max-height: 220px; }

/* Subtle glow on stat cards */
.stat-glow { box-shadow: 0 0 20px -5px var(--accent-glow); }
</style>
</head>
<body class="min-h-screen">

<!-- Auth Screen -->
<div id="authScreen" class="flex items-center justify-center min-h-screen">
  <div class="card border rounded-2xl p-10 w-full max-w-sm shadow-2xl" style="box-shadow: 0 25px 50px -12px rgba(99,102,241,0.15);">
    <div class="flex items-center gap-3 mb-8 justify-center">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-bold text-lg" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">C7</div>
      <h1 class="text-2xl font-bold tracking-tight">Context7 Proxy</h1>
    </div>
    <input id="masterKeyInput" type="password" data-i18n-placeholder="masterKey"
      class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 mb-4 font-mono text-sm transition bg-gray-100 dk-input">
    <button onclick="login()" class="w-full py-3 rounded-xl font-semibold text-white text-sm tracking-wide transition hover:brightness-110 active:scale-[0.98]"
      style="background: linear-gradient(135deg, #6366f1, #7c3aed);" data-i18n="login">Login</button>
    <p id="authError" class="text-red-400 text-sm mt-3 hidden text-center"></p>
  </div>
</div>

<!-- Main App -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <aside class="sidebar fixed left-0 top-0 bottom-0 border-r flex flex-col z-40" style="width: var(--sidebar-w);">
    <div class="flex items-center gap-2.5 px-5 h-14 border-b border-inherit shrink-0">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white font-bold text-xs" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">C7</div>
      <span class="font-bold tracking-tight text-sm">Context7 Proxy</span>
    </div>
    <nav class="flex-1 py-3 overflow-y-auto">
      <a class="nav-item active flex items-center gap-3 px-5 py-2.5 cursor-pointer" data-tab="dashboard" onclick="switchTab('dashboard')">
        <svg class="nav-icon w-[18px] h-[18px] text-gray-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span class="nav-label text-sm text-gray-400" data-i18n="dashboard">Dashboard</span>
      </a>
      <a class="nav-item flex items-center gap-3 px-5 py-2.5 cursor-pointer" data-tab="keys" onclick="switchTab('keys')">
        <svg class="nav-icon w-[18px] h-[18px] text-gray-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M15 7a4 4 0 0 0-4.5 3.97M7.5 15.5l-2 2M3 21l2-2m0 0 3.5-3.5M5 19l3.5-3.5M10 14l4-4m0 0a4 4 0 1 0 5.66-5.66 4 4 0 0 0-5.66 5.66z"/></svg>
        <span class="nav-label text-sm text-gray-400" data-i18n="keys">Keys</span>
      </a>
      <a class="nav-item flex items-center gap-3 px-5 py-2.5 cursor-pointer" data-tab="logs" onclick="switchTab('logs')">
        <svg class="nav-icon w-[18px] h-[18px] text-gray-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2M9 5h6"/><path d="M9 12h6M9 16h6"/></svg>
        <span class="nav-label text-sm text-gray-400" data-i18n="logs">Logs</span>
      </a>
      <a class="nav-item flex items-center gap-3 px-5 py-2.5 cursor-pointer" data-tab="settings" onclick="switchTab('settings')">
        <svg class="nav-icon w-[18px] h-[18px] text-gray-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4 1.4 1.4m10.6 10.6 1.4 1.4"/></svg>
        <span class="nav-label text-sm text-gray-400" data-i18n="settings">Settings</span>
      </a>
    </nav>
    <div class="border-t border-inherit p-4">
      <button onclick="logout()" class="flex items-center gap-2 text-xs text-gray-500 hover:text-red-400 transition w-full">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        <span data-i18n="logout">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Top Bar -->
  <header class="topbar fixed top-0 border-b flex items-center justify-between px-6 h-14 z-30" style="left: var(--sidebar-w); right: 0;">
    <h2 class="text-base font-semibold tracking-tight" id="pageTitle" data-i18n="dashboard">Dashboard</h2>
    <div class="flex items-center gap-2">
      <!-- Language Toggle -->
      <button onclick="toggleLang()" id="langBtn" class="topbar-btn flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border border-indigo-500 dark:border-indigo-400 bg-white dark:bg-indigo-600 text-indigo-600 dark:text-white hover:bg-indigo-50 dark:hover:bg-indigo-500 transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
        <span id="langLabel">EN</span>
      </button>
      <!-- Theme Toggle -->
      <button onclick="toggleTheme()" id="themeBtn" class="topbar-btn flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border border-indigo-500 dark:border-indigo-400 bg-white dark:bg-indigo-600 text-indigo-600 dark:text-white hover:bg-indigo-50 dark:hover:bg-indigo-500 transition">
        <svg id="themeIcon" class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        <span id="themeLabel">Light</span>
      </button>
      <!-- GitHub Link -->
      <a href="https://github.com/mydelren/context7-proxy" target="_blank" rel="noopener" class="topbar-btn flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium border border-indigo-500 dark:border-indigo-400 bg-white dark:bg-indigo-600 text-indigo-600 dark:text-white hover:bg-indigo-50 dark:hover:bg-indigo-500 transition">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        <span>GitHub</span>
      </a>
    </div>
  </header>

  <!-- Content Area -->
  <main class="transition-all" style="margin-left: var(--sidebar-w); padding-top: var(--topbar-h);">
    <div class="p-6 max-w-[1200px]">

      <!-- Dashboard -->
      <section id="tab-dashboard">
        <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6" id="statCards"></div>
        <div class="card border rounded-xl p-5">
          <h3 class="text-xs font-semibold uppercase tracking-widest text-gray-400 mb-4" data-i18n="req24h">Requests (last 24h)</h3>
          <canvas id="chart"></canvas>
        </div>
      </section>

      <!-- Keys -->
      <section id="tab-keys" class="hidden">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-lg font-bold" data-i18n="apiKeys">API Keys</h2>
          <button onclick="showKeyModal()" class="px-4 py-2 rounded-xl text-sm font-semibold text-white transition hover:brightness-110 active:scale-[0.97]"
            style="background: linear-gradient(135deg, #6366f1, #7c3aed);" data-i18n="addKey">Add Key</button>
        </div>
        <div class="card border rounded-xl overflow-hidden">
          <table class="w-full text-sm" id="keysTable">
            <thead><tr class="border-b border-gray-200 dark:border-gray-700">
              <th class="text-left p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="alias">Alias</th>
              <th class="text-left p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="status">Status</th>
              <th class="text-right p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="used">Used</th>
              <th class="text-left p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="lastUsed">Last Used</th>
              <th class="text-right p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="actions">Actions</th>
            </tr></thead><tbody></tbody>
          </table>
        </div>
      </section>

      <!-- Logs -->
      <section id="tab-logs" class="hidden">
        <div class="flex justify-between items-center mb-5">
          <h2 class="text-lg font-bold" data-i18n="requestLogs">Request Logs</h2>
          <div class="flex gap-2">
            <select id="logFilter" onchange="loadLogs(1)" class="rounded-lg px-3 py-1.5 text-xs font-medium border border-gray-200 dark:border-gray-600 bg-gray-100 dk-input">
              <option value="" data-i18n="all">All</option><option value="200">200</option><option value="429">429</option>
              <option value="401">401</option><option value="500">500</option>
            </select>
            <button onclick="clearLogs()" class="px-3 py-1.5 rounded-lg text-xs font-medium text-red-500 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/40 border border-red-200 dark:border-red-800/60 transition" data-i18n="clear">Clear</button>
          </div>
        </div>
        <div class="card border rounded-xl overflow-hidden">
          <table class="w-full text-sm" id="logsTable">
            <thead><tr class="border-b border-gray-200 dark:border-gray-700">
              <th class="text-left p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="time">Time</th>
              <th class="text-left p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="method">Method</th>
              <th class="text-left p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="path">Path</th>
              <th class="text-right p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="status">Status</th>
              <th class="text-right p-3 text-xs font-semibold uppercase tracking-wider text-gray-400" data-i18n="latency">Latency</th>
            </tr></thead><tbody></tbody>
          </table>
        </div>
        <div class="flex justify-center gap-1.5 mt-4" id="logPagination"></div>
      </section>

      <!-- Settings -->
      <section id="tab-settings" class="hidden">
        <div class="card border rounded-xl p-6 max-w-xl">
          <h2 class="text-lg font-bold mb-6" data-i18n="settings">Settings</h2>
          <div class="mb-6">
            <label class="text-xs font-semibold uppercase tracking-widest text-gray-400 block mb-2" data-i18n="masterKey">Master Key</label>
            <div class="flex gap-2">
              <div class="relative flex-1">
                <input id="masterKeyDisplay" readonly type="password"
                  class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 font-mono text-sm pr-10 bg-gray-100 dk-input">
                <button onclick="toggleKeyVisibility()" id="keyEyeBtn" class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 transition p-1">
                  <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <button onclick="copyMasterKey()" class="px-4 py-2.5 rounded-xl text-xs font-medium border border-gray-200 dk-btn transition bg-gray-100" data-i18n="copy">Copy</button>
              <button onclick="resetMasterKey()" class="px-4 py-2.5 rounded-xl text-xs font-medium text-red-500 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/40 border border-red-200 dark:border-red-800/60 transition" data-i18n="reset">Reset</button>
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold uppercase tracking-widest text-gray-400 block mb-2" data-i18n="mcpConfig">MCP Client Config</label>
            <pre class="rounded-xl p-4 text-xs font-mono overflow-x-auto border border-gray-200 dark:border-gray-600 bg-gray-100 dk-input" id="mcpConfig"></pre>
          </div>
        </div>
      </section>

    </div>
  </main>
</div>

<!-- Add Key Modal -->
<div id="keyModal" class="modal-bg fixed inset-0 flex items-center justify-center hidden z-50">
  <div class="card border rounded-2xl p-7 w-full max-w-md shadow-2xl" style="box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);">
    <h3 class="font-bold text-base mb-5" data-i18n="addApiKey">Add API Key</h3>
    <input id="newKeyAlias" data-i18n-placeholder="aliasOptional"
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 mb-3 text-sm transition bg-gray-100 dk-input">
    <input id="newKeyValue" placeholder="ctx7sk_..."
      class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 mb-5 font-mono text-sm transition bg-gray-100 dk-input">
    <div class="flex justify-end gap-2">
      <button onclick="hideKeyModal()" class="px-5 py-2.5 rounded-xl text-sm font-medium border border-gray-200 dk-btn transition bg-gray-100" data-i18n="cancel">Cancel</button>
      <button onclick="addKey()" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white transition hover:brightness-110 active:scale-[0.97]"
        style="background: linear-gradient(135deg, #6366f1, #7c3aed);" data-i18n="add">Add</button>
    </div>
  </div>
</div>

<script>
// ============ I18N ============
const T = {
  en: {
    dashboard: 'Dashboard', keys: 'Keys', logs: 'Logs', settings: 'Settings',
    logout: 'Logout', login: 'Login', masterKey: 'Master Key',
    apiKeys: 'API Keys', addKey: 'Add Key', alias: 'Alias', status: 'Status',
    used: 'Used', lastUsed: 'Last Used', actions: 'Actions',
    requestLogs: 'Request Logs', all: 'All', clear: 'Clear',
    time: 'Time', method: 'Method', path: 'Path', latency: 'Latency',
    copy: 'Copy', reset: 'Reset', mcpConfig: 'MCP Client Config',
    addApiKey: 'Add API Key', aliasOptional: 'Alias (optional)', cancel: 'Cancel', add: 'Add',
    req24h: 'Requests (last 24h)',
    totalKeys: 'Total Keys', activeKeys: 'Active Keys', coolingDown: 'Cooling Down',
    invalidKeys: 'Invalid Keys', requests24h: 'Requests (24h)',
    invalid: 'Invalid', cooling: 'Cooling', active: 'Active', disabled: 'Disabled',
    confirmDelete: 'Delete this key?', confirmClear: 'Clear all logs?',
    confirmReset: 'Reset master key? You will need the new key to log in.',
    newMasterKey: 'New master key:', saveIt: 'Save it!',
    errInvalid: 'Invalid master key', errNoKeys: 'No available keys',
    disable: 'Disable', enable: 'Enable', delete: 'Delete',
    light: 'Light', dark: 'Dark',
  },
  zh: {
    dashboard: '仪表盘', keys: '密钥管理', logs: '请求日志', settings: '设置',
    logout: '退出', login: '登录', masterKey: '主密钥',
    apiKeys: 'API 密钥', addKey: '添加密钥', alias: '别名', status: '状态',
    used: '使用次数', lastUsed: '最后使用', actions: '操作',
    requestLogs: '请求日志', all: '全部', clear: '清空',
    time: '时间', method: '方法', path: '路径', latency: '延迟',
    copy: '复制', reset: '重置', mcpConfig: 'MCP 客户端配置',
    addApiKey: '添加 API 密钥', aliasOptional: '别名（可选）', cancel: '取消', add: '添加',
    req24h: '请求量（最近 24 小时）',
    totalKeys: '密钥总数', activeKeys: '活跃密钥', coolingDown: '冷却中',
    invalidKeys: '失效密钥', requests24h: '请求量 (24h)',
    invalid: '失效', cooling: '冷却', active: '活跃', disabled: '禁用',
    confirmDelete: '确定删除此密钥？', confirmClear: '确定清空所有日志？',
    confirmReset: '确定重置主密钥？重置后需要新密钥才能登录。',
    newMasterKey: '新主密钥：', saveIt: '请妥善保存！',
    errInvalid: '主密钥无效', errNoKeys: '无可用密钥',
    disable: '禁用', enable: '启用', delete: '删除',
  }
};

let lang = localStorage.getItem('c7p_lang') || 'en';
let darkMode = localStorage.getItem('c7p_theme') !== 'light';
let TOKEN = localStorage.getItem('c7p_token') || '';
let chart = null;
let keyVisible = false;

function t(key) { return (T[lang] && T[lang][key]) || (T.en[key]) || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.getElementById('langLabel').textContent = lang === 'en' ? 'EN' : '中';
  document.getElementById('pageTitle').textContent = t(document.querySelector('[data-tab].active')?.dataset.tab || 'dashboard');
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('c7p_lang', lang);
  applyI18n();
  const activeTab = document.querySelector('[data-tab].active')?.dataset.tab;
  if (activeTab === 'dashboard') loadDashboard();
  if (activeTab === 'keys') loadKeys();
  if (activeTab === 'logs') loadLogs(1);
}

function applyTheme() {
  const html = document.documentElement;
  if (darkMode) {
    html.classList.add('dark');
    html.classList.remove('light');
  } else {
    html.classList.remove('dark');
    html.classList.add('light');
  }
  document.getElementById('themeLabel').textContent = darkMode ? 'Light' : 'Dark';
  document.getElementById('themeIcon').innerHTML = darkMode
    ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4 1.4 1.4m10.6 10.6 1.4 1.4"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>';
  if (chart) {
    const textColor = darkMode ? '#9ca3af' : '#6b7280';
    chart.options.scales.x.ticks.color = textColor;
    chart.options.scales.y.ticks.color = textColor;
    chart.update();
  }
}

function toggleTheme() {
  darkMode = !darkMode;
  localStorage.setItem('c7p_theme', darkMode ? 'dark' : 'light');
  applyTheme();
}

function toggleKeyVisibility() {
  keyVisible = !keyVisible;
  const inp = document.getElementById('masterKeyDisplay');
  inp.type = keyVisible ? 'text' : 'password';
  document.getElementById('eyeIcon').innerHTML = keyVisible
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
}

// ============ API ============
const api = {
  stats: () => fetch('/manage/stats', { headers: auth() }).then(r => r.json()),
  timeseries: () => fetch('/manage/stats/timeseries', { headers: auth() }).then(r => r.json()),
  keys: () => fetch('/manage/keys', { headers: auth() }).then(r => r.json()),
  addKey: (alias, key) => fetch('/manage/keys', { method: 'POST', headers: { ...auth(), 'Content-Type': 'application/json' }, body: JSON.stringify({ alias, key }) }).then(r => r.json()),
  delKey: id => fetch('/manage/keys/' + id, { method: 'DELETE', headers: auth() }).then(r => r.json()),
  toggleKey: (id, active) => fetch('/manage/keys/' + id, { method: 'PUT', headers: { ...auth(), 'Content-Type': 'application/json' }, body: JSON.stringify({ is_active: active }) }).then(r => r.json()),
  logs: (p, f) => { const off = (p - 1) * 50; return fetch('/manage/logs?limit=50&offset=' + off + (f ? '&status_code=' + f : ''), { headers: auth() }).then(r => r.json()); },
  clearLogs: () => fetch('/manage/logs', { method: 'DELETE', headers: auth() }).then(r => r.json()),
  resetKey: () => fetch('/manage/settings/master-key/reset', { method: 'POST', headers: auth() }).then(r => r.json()),
};

function auth() { return { 'Authorization': 'Bearer ' + TOKEN }; }
function fmtTime(ts) { return ts ? new Date(ts).toLocaleString() : '-'; }
function fmtMs(ms) { return ms >= 1000 ? (ms / 1000).toFixed(1) + 's' : ms + 'ms'; }

// ============ Auth ============
async function login() {
  const key = document.getElementById('masterKeyInput').value.trim();
  if (!key) return;
  TOKEN = key;
  try {
    await api.stats();
    localStorage.setItem('c7p_token', key);
    showApp();
  } catch {
    document.getElementById('authError').textContent = t('errInvalid');
    document.getElementById('authError').classList.remove('hidden');
    TOKEN = '';
  }
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('c7p_token');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

async function showApp() {
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('masterKeyDisplay').value = TOKEN;
  document.getElementById('masterKeyDisplay').type = 'password';
  keyVisible = false;
  document.getElementById('eyeIcon').innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  const host = location.origin;
  document.getElementById('mcpConfig').textContent = JSON.stringify({
    mcpServers: { context7: { command: 'npx', args: ['-y', '@upstash/context7-mcp@latest'],
      env: { CONTEXT7_API_URL: host } } }
  }, null, 2);
  switchTab('dashboard');
}

// ============ Tabs ============
function switchTab(name) {
  ['dashboard', 'keys', 'logs', 'settings'].forEach(tab => {
    document.getElementById('tab-' + tab).classList.toggle('hidden', tab !== name);
    document.querySelectorAll('[data-tab="' + tab + '"]').forEach(b => {
      b.classList.toggle('active', tab === name);
    });
  });
  document.getElementById('pageTitle').textContent = t(name);
  if (name === 'dashboard') loadDashboard();
  if (name === 'keys') loadKeys();
  if (name === 'logs') loadLogs(1);
}

// ============ Dashboard ============
async function loadDashboard() {
  const [s, ts] = await Promise.all([api.stats(), api.timeseries()]);
  const cards = [
    { label: 'totalKeys', value: s.total_keys, icon: 'M15 7a4 4 0 0 0-4.5 3.97', color: 'from-indigo-500 to-indigo-600' },
    { label: 'activeKeys', value: s.active_keys, icon: 'M9 12l2 2 4-4', color: 'from-emerald-500 to-emerald-600' },
    { label: 'coolingDown', value: s.cooling_keys, icon: 'M12 8v4l3 3', color: 'from-amber-500 to-amber-600' },
    { label: 'invalidKeys', value: s.invalid_keys, icon: 'M6 18L18 6M6 6l12 12', color: 'from-red-500 to-red-600' },
    { label: 'requests24h', value: s.today_requests, icon: 'M13 7h8m0 0v8m0-8l-8 8-4-4-6 6', color: 'from-violet-500 to-violet-600' },
  ];
  document.getElementById('statCards').innerHTML = cards.map(c => `
    <div class="card border rounded-xl p-4 stat-glow">
      <div class="flex items-center gap-2 mb-2">
        <div class="w-7 h-7 rounded-lg bg-gradient-to-br ${c.color} flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="${c.icon}"/></svg>
        </div>
        <span class="text-xs font-medium text-gray-500 dark:text-gray-400">${t(c.label)}</span>
      </div>
      <div class="text-2xl font-bold font-mono">${c.value}</div>
    </div>
  `).join('');

  const textColor = darkMode ? '#9ca3af' : '#6b7280';
  const gridColor = darkMode ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels: ts.map(t => t.hour), datasets: [{ label: 'Requests', data: ts.map(t => t.count), backgroundColor: 'rgba(99,102,241,0.7)', borderRadius: 6, borderSkipped: false }] },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: gridColor } },
        y: { ticks: { color: textColor, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: gridColor }, beginAtZero: true }
      }
    }
  });
}

// ============ Keys ============
async function loadKeys() {
  const keys = await api.keys();
  const tbody = document.querySelector('#keysTable tbody');
  const st = (k) => {
    if (k.is_invalid) return { cls: 'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400', text: t('invalid') };
    if (!k.is_active) return { cls: 'bg-gray-100 text-gray-500 dark:bg-gray-700 dark:text-gray-300', text: t('disabled') };
    if (k.cooldown_at) return { cls: 'bg-amber-50 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400', text: t('cooling') };
    return { cls: 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400', text: t('active') };
  };
  tbody.innerHTML = keys.map(k => {
    const s = st(k);
    return `<tr class="border-b border-gray-100 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition">
      <td class="p-3 font-medium">${k.alias || '-'}</td>
      <td class="p-3"><span class="px-2.5 py-0.5 rounded-full text-xs font-medium ${s.cls}">${s.text}</span></td>
      <td class="p-3 text-right font-mono text-xs">${k.used_count}</td>
      <td class="p-3 text-xs text-gray-400">${fmtTime(k.last_used_at)}</td>
      <td class="p-3 text-right">
        <button onclick="toggleKey(${k.id},${!k.is_active})" class="text-xs px-2.5 py-1 rounded-lg font-medium border border-gray-200 dk-btn transition bg-gray-100">${k.is_active ? t('disable') : t('enable')}</button>
        <button onclick="delKey(${k.id})" class="text-xs px-2.5 py-1 rounded-lg font-medium text-red-500 bg-red-50 dark:bg-red-900/30 hover:bg-red-100 dark:hover:bg-red-900/40 border border-red-200 dark:border-red-800/60 transition ml-1">${t('delete')}</button>
      </td>
    </tr>`;
  }).join('');
}

function showKeyModal() { document.getElementById('keyModal').classList.remove('hidden'); }
function hideKeyModal() { document.getElementById('keyModal').classList.add('hidden'); document.getElementById('newKeyAlias').value = ''; document.getElementById('newKeyValue').value = ''; }

async function addKey() {
  const alias = document.getElementById('newKeyAlias').value.trim();
  const key = document.getElementById('newKeyValue').value.trim();
  if (!key) return;
  await api.addKey(alias, key);
  hideKeyModal();
  loadKeys();
}

async function toggleKey(id, active) { await api.toggleKey(id, active); loadKeys(); }
async function delKey(id) { if (confirm(t('confirmDelete'))) { await api.delKey(id); loadKeys(); } }

// ============ Logs ============
async function loadLogs(page) {
  const filter = document.getElementById('logFilter').value;
  const res = await api.logs(page, filter);
  const tbody = document.querySelector('#logsTable tbody');
  tbody.innerHTML = res.logs.map(l => `<tr class="border-b border-gray-100 dark:border-gray-700/50 hover:bg-gray-50 dark:hover:bg-gray-800/40 transition">
    <td class="p-3 text-xs text-gray-400 font-mono">${fmtTime(l.created_at)}</td>
    <td class="p-3"><span class="px-2 py-0.5 rounded text-xs font-mono font-medium bg-indigo-50 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400">${l.method}</span></td>
    <td class="p-3 font-mono text-xs">${l.endpoint}</td>
    <td class="p-3 text-right font-mono text-xs"><span class="${l.status_code >= 400 ? 'text-red-500' : 'text-emerald-500'}">${l.status_code}</span></td>
    <td class="p-3 text-right font-mono text-xs text-gray-400">${fmtMs(l.latency_ms)}</td>
  </tr>`).join('');
  const totalPages = Math.ceil(res.total / 50);
  let pg = '';
  for (let i = 1; i <= totalPages; i++) {
    pg += `<button onclick="loadLogs(${i})" class="w-8 h-8 rounded-lg text-xs font-medium transition ${i === page ? 'bg-indigo-600 text-white' : 'border border-gray-200 dk-btn bg-gray-100'}">${i}</button>`;
  }
  document.getElementById('logPagination').innerHTML = pg;
}

async function clearLogs() { if (confirm(t('confirmClear'))) { await api.clearLogs(); loadLogs(1); } }

// ============ Settings ============
async function resetMasterKey() {
  if (!confirm(t('confirmReset'))) return;
  const res = await api.resetKey();
  TOKEN = res.master_key;
  localStorage.setItem('c7p_token', TOKEN);
  document.getElementById('masterKeyDisplay').value = TOKEN;
  document.getElementById('masterKeyDisplay').type = 'password';
  keyVisible = false;
  document.getElementById('eyeIcon').innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  alert(t('newMasterKey') + ' ' + TOKEN + '\n' + t('saveIt'));
}

function copyMasterKey() {
  const inp = document.getElementById('masterKeyDisplay');
  const realType = inp.type;
  inp.type = 'text';
  navigator.clipboard.writeText(inp.value);
  inp.type = realType;
}

// ============ Init ============
applyTheme();
applyI18n();
if (TOKEN) { api.stats().then(() => showApp()).catch(() => { TOKEN = ''; localStorage.removeItem('c7p_token'); }); }
</script>
</body>
</html>
